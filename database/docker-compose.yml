version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: academia_postgres
    restart: always
    environment:
      POSTGRES_USER: academia
      POSTGRES_PASSWORD: academia123
      POSTGRES_DB: academia_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: